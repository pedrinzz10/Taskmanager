<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f2f5; }
    .card { border-radius: 12px; }
    .task-done td { text-decoration: line-through; color: #999; }
    #login-section { max-width: 380px; margin: 100px auto; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-section">
  <div class="card shadow-sm p-4">
    <h4 class="mb-4 text-center fw-bold">📝 Task Manager</h4>
    <div id="login-error" class="alert alert-danger d-none">Usuário ou senha inválidos.</div>
    <div class="mb-3">
      <label class="form-label">Usuário</label>
      <input id="username" type="text" class="form-control" value="admin" />
    </div>
    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input id="password" type="password" class="form-control" value="123" />
    </div>
    <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-section" class="d-none container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">📝 Task Manager</h4>
    <button class="btn btn-outline-secondary btn-sm" onclick="logout()">Sair</button>
  </div>

  <!-- FORMULÁRIO -->
  <div class="card shadow-sm p-4 mb-4">
    <h6 class="fw-bold mb-3" id="form-title">Nova Tarefa</h6>
    <input type="hidden" id="edit-id" />
    <div class="row g-3">
      <div class="col-md-5">
        <input id="task-title" type="text" class="form-control" placeholder="Título" />
      </div>
      <div class="col-md-5">
        <input id="task-desc" type="text" class="form-control" placeholder="Descrição" />
      </div>
      <div class="col-md-2 d-grid">
        <button class="btn btn-success" onclick="saveTask()">Salvar</button>
      </div>
    </div>
    <div id="form-error" class="alert alert-danger mt-3 d-none">Título é obrigatório.</div>
    <button id="cancel-btn" class="btn btn-link btn-sm mt-1 d-none text-secondary" onclick="cancelEdit()">Cancelar edição</button>
  </div>

  <!-- LISTA -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <table class="table table-hover mb-0 align-middle">
        <thead class="table-light">
          <tr>
            <th style="width:50px">✓</th>
            <th>Título</th>
            <th>Descrição</th>
            <th style="width:140px">Ações</th>
          </tr>
        </thead>
        <tbody id="task-list">
          <tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let authHeader = '';

  function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    authHeader = 'Basic ' + btoa(user + ':' + pass);

    fetch('/tasks', { headers: { 'Authorization': authHeader } })
      .then(res => {
        if (res.status === 401) {
          document.getElementById('login-error').classList.remove('d-none');
        } else if (res.ok) {
          document.getElementById('login-section').classList.add('d-none');
          document.getElementById('app-section').classList.remove('d-none');
          document.getElementById('login-error').classList.add('d-none');
          loadTasks();
        }
      })
      .catch(() => document.getElementById('login-error').classList.remove('d-none'));
  }

  function logout() {
    authHeader = '';
    document.getElementById('app-section').classList.add('d-none');
    document.getElementById('login-section').classList.remove('d-none');
  }

  function loadTasks() {
    fetch('/tasks', { headers: { 'Authorization': authHeader } })
      .then(res => res.json())
      .then(tasks => renderTasks(tasks));
  }

  function renderTasks(tasks) {
    const tbody = document.getElementById('task-list');
    if (tasks.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Nenhuma tarefa ainda.</td></tr>';
      return;
    }
    tbody.innerHTML = tasks.map(t => `
      <tr class="${t.completed ? 'task-done' : ''}">
        <td>
          <input type="checkbox" class="form-check-input" ${t.completed ? 'checked' : ''}
            onchange="toggleCompleted(${t.id}, this.checked, '${escape(t.title)}', '${escape(t.description)}')"/>
        </td>
        <td>${t.title}</td>
        <td>${t.description || '<span class="text-muted">—</span>'}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick="startEdit(${t.id}, '${escape(t.title)}', '${escape(t.description)}', ${t.completed})">Editar</button>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${t.id})">Deletar</button>
        </td>
      </tr>
    `).join('');
  }

  function escape(str) {
    return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  function saveTask() {
    const title = document.getElementById('task-title').value.trim();
    const desc  = document.getElementById('task-desc').value.trim();
    const id    = document.getElementById('edit-id').value;

    if (!title) {
      document.getElementById('form-error').classList.remove('d-none');
      return;
    }
    document.getElementById('form-error').classList.add('d-none');

    const method = id ? 'PUT' : 'POST';
    const url    = id ? `/tasks/${id}` : '/tasks';
    const body   = JSON.stringify({ title, description: desc, completed: false });

    fetch(url, {
      method,
      headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
      body
    }).then(() => { cancelEdit(); loadTasks(); });
  }

  function startEdit(id, title, desc, completed) {
    document.getElementById('edit-id').value = id;
    document.getElementById('task-title').value = unescape(title);
    document.getElementById('task-desc').value = unescape(desc);
    document.getElementById('form-title').textContent = 'Editar Tarefa';
    document.getElementById('cancel-btn').classList.remove('d-none');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    document.getElementById('edit-id').value = '';
    document.getElementById('task-title').value = '';
    document.getElementById('task-desc').value = '';
    document.getElementById('form-title').textContent = 'Nova Tarefa';
    document.getElementById('cancel-btn').classList.add('d-none');
  }

  function toggleCompleted(id, completed, title, desc) {
    fetch(`/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: unescape(title), description: unescape(desc), completed })
    }).then(() => loadTasks());
  }

  function deleteTask(id) {
    if (!confirm('Deletar esta tarefa?')) return;
    fetch(`/tasks/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': authHeader }
    }).then(() => loadTasks());
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
